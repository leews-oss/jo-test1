<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로또 번호 추천기</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      color: #333;
    }
    .container {
      background: white;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      text-align: center;
      width: 350px;
    }
    h1 {
      margin-bottom: 20px;
    }
    button {
      padding: 12px 20px;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      background: #007bff;
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }
    button:hover {
      background: #0056b3;
    }
    .numbers {
      margin-top: 25px;
      font-size: 18px;
      font-weight: bold;
      line-height: 1.8;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>🎲 로또 번호 추천</h1>
  <button onclick="generateLotto()">번호 뽑기</button>
  <div class="numbers" id="result">버튼을 눌러주세요</div>
</div>

<script>
  function getOneSet() {
    let numbers = [];

    while (numbers.length < 6) {
      let num = Math.floor(Math.random() * 45) + 1;
      if (!numbers.includes(num)) {
        numbers.push(num);
      }
    }

    return numbers.sort((a, b) => a - b);
  }

  function generateLotto() {
    let resultText = "";

    for (let i = 1; i <= 5; i++) {
      let set = getOneSet();
      resultText += i + "세트: " + set.join("  ") + "\n";
    }

    document.getElementById("result").innerText = resultText;
  }
</script>

</body>
</html>
